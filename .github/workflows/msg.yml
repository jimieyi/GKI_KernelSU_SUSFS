name: 发送 Telegram 通知

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  name: 发送 Telegram 通知
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        CHANGE_LOG: ${{ inputs.change_log }}
      run: |
        TEXT=$(cat <<EOF
        <b>New Release Pushed:</b>
        Release Tag: <code>$NEW_TAG</code>
        Download: <a href="github.com/coolzyd9107/GKI_KernelSU_SUSFS/releases/$NEW_TAG/">Click Here</a>
        EOF
        )
        curl -s "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
             -d chat_id="$CHAT_ID" \
             -d parse_mode="HTML" \
             -d text="$TEXT"