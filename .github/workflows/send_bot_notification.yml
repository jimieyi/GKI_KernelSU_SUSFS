name: 发送 Telegram 机器人通知
 # 并发控制：同一分支只运行一个实例，新运行会取消旧的
  concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
  permissions:
    contents: write
    actions: write
  on:
    workflow_dispatch:
      inputs: 
       # ==================== Bot-Push 选项 ====================
        msg_type:
          description: "通知类型"
          type: boolean
          default: false
          required: true
        content:
          description: "通知内容"
          type: string
          default: ""
          required: true
  jobs:
    send-telegram:
    runs-on: ubuntu-latest
    steps:
    - name: 发送 Telegram 群组通知(频道讨论组)
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID_3 }}
      MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID_3 }}
      run: |
        set -euo pipefail
        INPUT_MSG_TYPE="${{ inputs.msg_type }}"
        INPUT_CONTENT="${{ inputs.content }}"
           # 构造消息内容（HTML 格式）
        TEXT="<b>New Notification:</b>%0A%0A"

        TEXT+="Notice Type: <code>${INPUT_MSG_TYPE}</code>%0A%0A"

        TEXT+="Content:%0A<pre>${INPUT_CONTENT}</pre>"
           # 发送请求
        curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
             -d "chat_id=${CHAT_ID}" \
             -d "message_thread_id=${MESSAGE_THREAD_ID}" \
             -d "parse_mode=HTML" \
             -d "text=${TEXT}"
